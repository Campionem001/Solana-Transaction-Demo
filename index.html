<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Solana Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.87.6/lib/index.iife.js"></script>
</head>
<body>
    <h1>Solana Smart Stack</h1>
    <button id="connect">Connect Wallet</button>
    <button id="simulate">Simulate</button>
    <button id="submit">Submit</button>
    <pre id="output">Ready...</pre>

    <script>
        let wallet = null;
        let provider = null;
        let connection = null;

        document.getElementById('connect').onclick = async function() {
            // Find wallet
            if (window.solana) {
                provider = window.solana;
            } else {
                for (let key in window) {
                    try {
                        let val = window[key];
                        if (val && typeof val.connect === 'function' && (val.publicKey || val._publicKey)) {
                            provider = val;
                            break;
                        }
                    } catch(e) {}
                }
            }
            if (!provider) {
                alert('No wallet found');
                return;
            }
            await provider.connect();
            wallet = provider.publicKey.toString();
            document.getElementById('output').innerText = 'Connected: ' + wallet.slice(0,6) + '...';
            connection = new solanaWeb3.Connection('https://api.devnet.solana.com');
        };

        document.getElementById('simulate').onclick = async function() {
            if (!wallet) {
                alert('Connect wallet first');
                return;
            }
            const from = new solanaWeb3.PublicKey(wallet);
            const tx = new solanaWeb3.Transaction().add(
                solanaWeb3.SystemProgram.transfer({
                    fromPubkey: from,
                    toPubkey: from,
                    lamports: 1000
                })
            );
            const {blockhash} = await connection.getLatestBlockhash();
            tx.recentBlockhash = blockhash;
            tx.feePayer = from;
            const sim = await connection.simulateTransaction(tx);
            if (sim.value.err) {
                document.getElementById('output').innerText = 'Simulation failed: ' + JSON.stringify(sim.value.err);
                return;
            }
            document.getElementById('output').innerText = '✅ Simulation passed! (compute: ' + (sim.value.unitsConsumed || 'N/A') + ')';
        };

        document.getElementById('submit').onclick = async function() {
            if (!wallet || !provider) {
                alert('Connect wallet first');
                return;
            }
            const from = new solanaWeb3.PublicKey(wallet);
            const tx = new solanaWeb3.Transaction().add(
                solanaWeb3.SystemProgram.transfer({
                    fromPubkey: from,
                    toPubkey: from,
                    lamports: 1000
                })
            );
            const {blockhash} = await connection.getLatestBlockhash();
            tx.recentBlockhash = blockhash;
            tx.feePayer = from;
            const {signature} = await provider.signAndSendTransaction(tx);
            await connection.confirmTransaction(signature, 'confirmed');
            const link = 'https://explorer.solana.com/tx/' + signature + '?cluster=devnet';
            document.getElementById('output').innerHTML = '✅ Confirmed! <a href="' + link + '" target="_blank">View on Solscan</a>';
        };
    </script>
</body>
</html>
